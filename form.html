<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Biodata</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

    <div class="container" style="max-width: 600px;">
        <div class="card shadow p-4">
            <h4 class="text-center text-primary mb-4">Formulir Biodata Diri</h4>
            
            <form action="#">
                <div class="mb-3">
                    <label for="nama" class="form-label">Nama Lengkap</label>
                    <input type="text" class="form-control" id="nama" placeholder="Masukkan nama Anda" required>
                </div>

                <div class="mb-3">
                    <label for="alamat" class="form-label">Alamat</label>
                    <input type="text" class="form-control" id="alamat" placeholder="Masukkan alamat Anda" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Jenis Kelamin</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="jk" id="laki" value="laki-laki" checked>
                        <label class="form-check-label" for="laki">Laki-Laki</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="jk" id="perempuan" value="perempuan">
                        <label class="form-check-label" for="perempuan">Perempuan</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Keahlian & Minat IT</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="web" value="Web">
                        <label class="form-check-label" for="web">Web Development</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="desktop" value="Desktop">
                        <label class="form-check-label" for="desktop">Desktop Application (C#)</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="cyber" value="Cybersecurity">
                        <label class="form-check-label" for="cyber">Cybersecurity & Networking</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="kota" class="form-label">Kota Asal</label>
                    <select class="form-select" id="kota">
                        <option value="Yogyakarta">Yogyakarta</option>
                        <option value="Semarang">Semarang</option>
                        <option value="Bandung">Bandung</option>
                        <option value="Jakarta">Jakarta</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label for="alasan" class="form-label">Ceritakan Singkat Tentang Diri Anda</label>
                    <textarea class="form-control" id="alasan" rows="4" placeholder="Tulis di sini..."></textarea>
                </div>

                <button type="submit" class="btn btn-success w-100">Submit Biodata</button>
            </form>
        </div>

        <div class="text-center mt-4">
            <a href="index.html" class="btn btn-secondary">Kembali ke Home</a>
        </div>
    </div>

</body>
</html>
